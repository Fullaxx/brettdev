name: Build and Push to ghcr.io

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push brettdev
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/fullaxx/brettdev:latest

      - name: Build and push brettdev-full
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.full
          push: true
          tags: ghcr.io/fullaxx/brettdev-full:latest
